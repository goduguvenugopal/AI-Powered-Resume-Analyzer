<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Resume Analyzer | Instant Resume Feedback & ATS Score</title>
    <meta name="description" content="Analyze your resume instantly with AI. Get ATS score, strengths, weaknesses, and improvement suggestions to land your dream job." />
    <meta name="keywords" content="AI resume analyzer, resume checker, ATS score, CV analysis, resume feedback, job application tools" />
    <meta name="author" content="Venugopal" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#18181b" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:title" content="AI Resume Analyzer" />
    <meta property="og:description" content="Get instant AI-powered feedback on your resume. Improve your chances of getting hired." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:image" content="https://yourdomain.com/preview.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Resume Analyzer" />
    <meta name="twitter:description" content="Analyze your resume with AI and boost your job chances." />
    <meta name="twitter:image" content="https://yourdomain.com/preview.png" />

    <!-- PWA (optional but recommended) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://yourdomain.com" />

    <!-- Fonts (optional) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
